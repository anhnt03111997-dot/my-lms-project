<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — AMELA LMS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');

:root{
  --black:#1A1A1A;
  --white:#FFFFFF;
  --yellow:#F5C518;
  --gray:#F5F5F5;
  --muted:#9A9A9A;
  --border:#E2E2E2;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Roboto',sans-serif;background:var(--black);color:var(--black);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;-webkit-font-smoothing:antialiased;
}
.login-card{
  background:var(--white);width:100%;max-width:420px;
  border-radius:20px;padding:40px 36px;
  box-shadow:0 24px 60px rgba(0,0,0,.45);
  text-align:center;
}
.login-mascot{height:90px;width:auto;display:block;margin:0 auto 14px}
.login-logo{height:28px;width:auto;display:block;margin:0 auto 24px}
.login-card h1{font-size:22px;font-weight:700;color:var(--black)}
.login-card .subtitle{color:var(--muted);font-size:14px;margin-bottom:28px}

form{text-align:left}
.field{margin-bottom:16px}
.field label{display:block;font-size:14px;font-weight:500;margin-bottom:6px;color:var(--black)}
.input-wrap{position:relative;display:flex;align-items:center}
.field input{
  width:100%;font-family:inherit;font-size:15px;color:var(--black);
  border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;
  outline:none;transition:border-color .2s ease,box-shadow .2s ease;
}
.field input::placeholder{color:#BDBDBD}
.field input:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(245,197,24,.18)}
.input-wrap input{padding-right:46px}
.toggle-pw{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:6px;display:flex;
  border-radius:8px;transition:background .2s ease;
}
.toggle-pw:hover{background:var(--gray)}
.toggle-pw svg{width:22px;height:22px;display:block}

.error-msg{
  display:none;background:#FEE2E2;color:#DC2626;
  border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:16px;
}
.error-msg.show{display:block}

.btn-login{
  width:100%;background:var(--yellow);color:var(--black);
  font-family:inherit;font-weight:700;font-size:16px;
  padding:14px;border-radius:10px;border:none;cursor:pointer;
  transition:all .2s ease;margin-top:4px;
}
.btn-login:hover{background:#e3b500;transform:translateY(-2px);box-shadow:0 10px 24px rgba(245,197,24,.4)}
.btn-login:disabled{opacity:.7;cursor:not-allowed;transform:none;box-shadow:none}

.forgot-row{text-align:right;margin:-6px 0 16px}
.forgot-link{font-size:13px;color:var(--muted);text-decoration:none;cursor:pointer}
.forgot-link:hover{color:#c9a200;text-decoration:underline}

@media(max-width:440px){
  .login-card{padding:32px 22px;border-radius:16px}
  .login-mascot{height:78px}
}
</style>
</head>
<body>

<div class="login-card">
  <img src="mascot.png" alt="Mascot AMELA" class="login-mascot">
  <img src="logo-dark.png" alt="AMELA — TEK FOR HUMAN" class="login-logo">
  <h1>Chào mừng trở lại</h1>
  <p class="subtitle">Đăng nhập để tiếp tục học</p>

  <form id="loginForm" novalidate>
    <div class="error-msg" id="error-message"></div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="name@amela.vn" autocomplete="username">
    </div>

    <div class="field">
      <label for="password">Mật khẩu</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Hiện/ẩn mật khẩu">
          <!-- icon con mắt (mặc định: đang ẩn -> hiển thị mắt mở) -->
          <svg id="eyeIcon" viewBox="0 0 24 24" aria-hidden="true"><g fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></g></svg>
        </button>
      </div>
    </div>

    <div class="forgot-row"><a href="#" class="forgot-link" id="forgot-btn">Quên mật khẩu?</a></div>

    <button type="submit" class="btn-login" id="login-btn">Đăng nhập</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDx85zsy3UfYyjV9raZLY0knwIwho8UhLg",
  authDomain: "amela-lms.firebaseapp.com",
  projectId: "amela-lms",
  storageBucket: "amela-lms.firebasestorage.app",
  messagingSenderId: "833013103244",
  appId: "1:833013103244:web:80ea9e14f887b50e4bd9a9"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Cờ chống redirect ngay khi vừa đăng xuất
let isLoggingOut = false;

// Xác định role dựa trên email
function roleFor(email){
  if(email === 'admin@amela.vn') return 'admin';
  if(email === 'teacher@amela.vn') return 'teacher';
  return 'employee';
}

// Nếu phiên Firebase còn -> khôi phục localStorage và vào thẳng trang chủ
onAuthStateChanged(auth, function(user){
  if(isLoggingOut) return;
  if(user){
    const email = user.email || '';
    localStorage.setItem('lms_user', JSON.stringify({
      uid: user.uid,
      email: email,
      name: user.displayName || email.split('@')[0],
      role: roleFor(email)
    }));
    window.location.href = 'index.html';
  }
});

// ===== Thông báo =====
function showError(msg){
  const el = document.getElementById('error-message');
  if(!el) return;
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = '';   // trả về màu đỏ mặc định từ CSS
  el.style.color = '';
  el.style.borderColor = '';
}
function showSuccess(msg){
  const el = document.getElementById('error-message');
  if(!el) return;
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = '#F0FDF4';
  el.style.color = '#16A34A';
  el.style.borderColor = '#86EFAC';
}
function clearMsg(){
  const el = document.getElementById('error-message');
  if(el) el.style.display = 'none';
}

// ===== Hiện/ẩn mật khẩu (giữ nguyên hành vi) =====
const pwEl = document.getElementById('password');
const toggle = document.getElementById('togglePw');
const eyeIcon = document.getElementById('eyeIcon');
const EYE_OPEN = '<g fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></g>';
const EYE_OFF = '<g fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7c1.7 0 3.2.5 4.5 1.2M22 12s-3.6 7-10 7c-1.7 0-3.2-.5-4.5-1.2"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/><line x1="3" y1="3" x2="21" y2="21"/></g>';
if(toggle){
  toggle.addEventListener('click', function(){
    const show = pwEl.type === 'password';
    pwEl.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? EYE_OFF : EYE_OPEN;
  });
}

// ===== Đăng nhập (Firebase) =====
async function handleLogin(){
  clearMsg();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!email){ showError('Vui lòng nhập email'); return; }
  if(!password){ showError('Vui lòng nhập mật khẩu'); return; }

  const btn = document.getElementById('login-btn');
  const btnText = btn.textContent;
  btn.textContent = 'Đang đăng nhập...';
  btn.disabled = true;

  try{
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    const role = roleFor(email);

    localStorage.setItem('lms_user', JSON.stringify({
      uid: user.uid,
      email: user.email,
      name: user.displayName || email.split('@')[0],
      role: role
    }));

    window.location.href = 'index.html';
  }catch(error){
    btn.textContent = btnText;
    btn.disabled = false;
    switch(error.code){
      case 'auth/user-not-found':
        showError('Email không tồn tại trong hệ thống'); break;
      case 'auth/wrong-password':
      case 'auth/invalid-credential':
        showError('Mật khẩu không chính xác'); break;
      case 'auth/invalid-email':
        showError('Email không đúng định dạng'); break;
      case 'auth/too-many-requests':
        showError('Đăng nhập thất bại quá nhiều lần. Vui lòng thử lại sau'); break;
      default:
        showError('Đăng nhập thất bại: ' + error.message);
    }
  }
}

// ===== Quên mật khẩu =====
async function handleForgotPassword(){
  const email = document.getElementById('email').value.trim();
  if(!email){ showError('Nhập email trước để lấy lại mật khẩu'); return; }
  try{
    await sendPasswordResetEmail(auth, email);
    showSuccess('✅ Email đặt lại mật khẩu đã được gửi. Kiểm tra hộp thư của bạn.');
  }catch(error){
    showError('Không thể gửi email. Kiểm tra lại địa chỉ.');
  }
}

// ===== Gắn sự kiện (không dùng onclick trong HTML) =====
const form = document.getElementById('loginForm');
if(form){ form.addEventListener('submit', function(e){ e.preventDefault(); handleLogin(); }); }

const forgotBtn = document.getElementById('forgot-btn');
if(forgotBtn){ forgotBtn.addEventListener('click', function(e){ e.preventDefault(); handleForgotPassword(); }); }

document.getElementById('email').addEventListener('input', clearMsg);
document.getElementById('password').addEventListener('input', clearMsg);
</script>

</body>
</html>
